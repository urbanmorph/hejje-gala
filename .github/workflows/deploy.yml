name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: mkdir -p src/lib/assets && echo '{"success":true,"companies":[]}' > src/lib/assets/companies-blr.json

      - run: pnpm run build
        env:
          ALTMO_DOMAIN: placeholder
          ALTMO_API_KEY: placeholder
          ALTMO_CHALLENGE_ID: placeholder
          ALTMO_CITY_ID: placeholder
          PUBLIC_GOOGLE_MAPS_API_KEY: placeholder

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=hejje-gala --commit-dirty=true
